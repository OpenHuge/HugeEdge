name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm validate:capabilities
      - run: pnpm validate:policy-packs
      - run: pnpm validate:wasm-artifacts
      - run: pnpm validate:probe-profiles

  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: hugeedge
          POSTGRES_USER: hugeedge
          POSTGRES_DB: hugeedge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.2"
          cache: true
      - run: go test ./...
      - run: go build ./apps/api/cmd/api ./apps/worker/cmd/worker ./apps/ext-runtime/cmd/ext-runtime ./apps/agent/cmd/agent
      - run: go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.0 generate
      - uses: golang-migrate/migrate-action@v1
        with:
          path: db/migrations
          database: postgres://hugeedge:hugeedge@localhost:5432/hugeedge?sslmode=disable
          command: up
