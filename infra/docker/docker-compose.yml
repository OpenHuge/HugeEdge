services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: hugeedge
      POSTGRES_PASSWORD: hugeedge
      POSTGRES_DB: hugeedge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hugeedge -d hugeedge"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  nats:
    image: nats:2.12
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    image: golang:1.26.2
    working_dir: /workspace
    command: /usr/local/go/bin/go run ./apps/api/cmd/api
    environment:
      HUGEEDGE_HTTP_ADDR: :8080
      DATABASE_URL: postgres://hugeedge:hugeedge@postgres:5432/hugeedge?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: local-dev-secret
      GOFLAGS: -buildvcs=false
    volumes:
      - ../..:/workspace
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

  worker:
    image: golang:1.26.2
    working_dir: /workspace
    command: /usr/local/go/bin/go run ./apps/worker/cmd/worker
    environment:
      NATS_URL: nats://nats:4222
      REDIS_ADDR: redis:6379
      GOFLAGS: -buildvcs=false
    volumes:
      - ../..:/workspace
    depends_on:
      - nats
      - redis

  ext-runtime:
    image: golang:1.26.2
    working_dir: /workspace
    command: /usr/local/go/bin/go run ./apps/ext-runtime/cmd/ext-runtime
    environment:
      WASM_RUNTIME: wasmedge
      EXT_RUNTIME_ISOLATION: process
      GOFLAGS: -buildvcs=false
    volumes:
      - ../..:/workspace

  web:
    image: node:24.11.1
    working_dir: /workspace
    command: sh -c "corepack enable && corepack prepare pnpm@10.33.0 --activate && pnpm install && pnpm --filter @hugeedge/web dev --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    volumes:
      - ../..:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  nats-data:
  minio-data:
