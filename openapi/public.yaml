openapi: 3.1.0
info:
  title: HugeEdge Public API
  version: 0.1.0
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        "200":
          description: API process health
  /readyz:
    get:
      operationId: readyz
      responses:
        "200":
          description: API dependency readiness
  /v1/sub/{token}:
    get:
      operationId: getSubscriptionFeed
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription feed payload
    head:
      operationId: headSubscriptionFeed
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription feed metadata
